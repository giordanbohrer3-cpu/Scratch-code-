<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#12040a" />
  <title>Você aceita? 💗</title>
  <style>
    :root {
      --neon-pink: #ff2d78;
      --neon-soft: #ff6fa5;
      --neon-glow: #ff1e5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 50% 30%, #3a0d16 0%, #240710 45%, #12040a 100%);
      background-attachment: fixed;
      color: #ffe6ef;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    #bgLetras { z-index: 0; }
    #fx { z-index: 9999; }

    /* letras caindo de fundo */
    #bgLetras span {
      position: absolute;
      color: var(--neon-soft);
      opacity: 0.06;
      filter: drop-shadow(0 0 4px rgba(255, 45, 120, 0.2));
      animation: chuvaLetra linear infinite;
      user-select: none;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 120px;
      text-align: center;
    }
    @keyframes chuvaLetra {
      0%   { transform: translateY(-100vh) rotateZ(-10deg); opacity: 0; }
      10%  { opacity: 0.08; }
      90%  { opacity: 0.07; }
      100% { transform: translateY(100vh) rotateZ(10deg); opacity: 0; }
    }

    .stage {
      position: relative;
      z-index: 2;
      max-width: 520px;
      width: 100%;
      padding: 40px 24px;
    }

    .big-heart {
      font-size: clamp(70px, 20vw, 140px);
      line-height: 1;
      color: var(--neon-pink);
      text-shadow:
        0 0 8px #fff0f6,
        0 0 18px var(--neon-glow),
        0 0 38px var(--neon-glow),
        0 0 70px var(--neon-pink);
      animation: beat 1.3s ease-in-out infinite;
      margin-bottom: 20px;
      display: inline-block;
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      15%      { transform: scale(1.18); }
      30%      { transform: scale(1); }
      45%      { transform: scale(1.1); }
    }

    .pergunta {
      font-size: clamp(24px, 6.2vw, 32px);
      font-weight: 700;
      line-height: 1.6;
      letter-spacing: 0.5px;
      text-shadow: 0 0 12px rgba(255, 45, 120, 0.55), 0 0 24px rgba(255, 30, 90, 0.35);
      margin-bottom: 40px;
      text-wrap: balance;
      animation: fadeIn 800ms ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .buttons-container {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      margin-top: 30px;
    }

    .btn {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      border: 2px solid var(--neon-pink);
      background: rgba(255, 45, 120, 0.08);
      color: #fff0f6;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 50px;
      text-shadow: 0 0 8px var(--neon-glow);
      touch-action: manipulation;
      box-shadow:
        0 0 12px rgba(255, 45, 120, 0.6),
        inset 0 0 12px rgba(255, 45, 120, 0.25);
      transition: all 0.3s ease;
      animation: btnPulse 2s ease-in-out infinite;
      position: relative;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.05);
      background: rgba(255, 45, 120, 0.22);
      box-shadow:
        0 0 22px rgba(255, 45, 120, 0.9),
        0 0 44px rgba(255, 30, 90, 0.6),
        inset 0 0 16px rgba(255, 45, 120, 0.4);
    }
    .btn:active { transform: scale(0.96); }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(255,45,120,0.6), inset 0 0 12px rgba(255,45,120,0.25); }
      50%      { box-shadow: 0 0 24px rgba(255,45,120,0.9), inset 0 0 18px rgba(255,45,120,0.4); }
    }

    #btn-sim {
      font-size: clamp(16px, 4.2vw, 22px);
      padding: 14px 28px;
      min-height: 52px;
    }

    #btn-nao {
      font-size: clamp(14px, 3.8vw, 18px);
      padding: 12px 24px;
      min-height: 48px;
      opacity: 0.8;
    }
    #btn-nao:hover { opacity: 1; }

    .burst-heart {
      position: absolute;
      color: var(--neon-pink);
      will-change: transform, opacity;
      text-shadow:
        0 0 6px #fff0f6,
        0 0 14px var(--neon-glow),
        0 0 26px var(--neon-pink);
    }

    .spotify-wrap {
      margin: 24px auto 0;
      width: 100%;
      max-width: 420px;
      min-height: 152px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 26px rgba(255, 45, 120, 0.55);
      animation: fadeIn 900ms ease both;
    }
    .spotify-wrap iframe { display: block; width: 100%; border: 0; border-radius: 14px; }

    .assinatura {
      margin-top: 20px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--neon-soft);
      opacity: 0.8;
      text-shadow: 0 0 8px rgba(255, 45, 120, 0.4);
    }

    @media (prefers-reduced-motion: reduce) {
      .big-heart, .btn, #bgLetras span { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="layer" id="bgLetras" aria-hidden="true"></div>
  <div class="layer" id="fx" aria-hidden="true"></div>

  <main class="stage" id="stage">
    <!-- conteúdo injetado via JS -->
  </main>

  <script>
    // ---------- letras caindo de fundo ----------
    const letras = [
      "Logo eu\ntomo seu lugar",
      "No seu coração",
      "Logo eu\nsou seu amor",
      "Sou seu destino",
      "Tô aqui",
      "Pra ficar",
      "Com você",
      "Pra sempre",
      "Logo eu\nfaço você",
      "Ser feliz",
      "Meu amor",
      "É você"
    ];

    (function makeLetrasChuva() {
      const c = document.getElementById('bgLetras');
      const total = 14;
      for (let i = 0; i < total; i++) {
        const s = document.createElement('span');
        s.textContent = letras[Math.floor(Math.random() * letras.length)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDuration = (18 + Math.random() * 14) + 's';
        s.style.animationDelay = (-Math.random() * 25) + 's';
        c.appendChild(s);
      }
    })();

    // ---------- explosão de corações ----------
    const fx = document.getElementById('fx');
    function heartBurst(x, y, amount) {
      amount = amount || 40;
      for (let i = 0; i < amount; i++) {
        const h = document.createElement('div');
        h.className = 'burst-heart';
        h.textContent = '♥';
        const size = 16 + Math.random() * 30;
        h.style.fontSize = size + 'px';
        h.style.left = x + 'px';
        h.style.top = y + 'px';
        const hue = 330 + Math.random() * 25;
        h.style.color = `hsl(${hue}, 100%, ${62 + Math.random() * 12}%)`;
        fx.appendChild(h);

        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 260;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist - (70 + Math.random() * 90);
        const rot = (Math.random() * 720 - 360);
        const dur = 950 + Math.random() * 950;

        h.animate([
          { transform: 'translate(-50%, -50%) scale(0.2) rotate(0deg)', opacity: 1 },
          { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1) rotate(${rot}deg)`, opacity: 1, offset: 0.7 },
          { transform: `translate(calc(-50% + ${dx * 1.15}px), calc(-50% + ${dy * 1.15}px)) scale(0.9) rotate(${rot}deg)`, opacity: 0 }
        ], { duration: dur, easing: 'cubic-bezier(0.15, 0.7, 0.3, 1)' });

        setTimeout(() => h.remove(), dur + 60);
      }
    }

    // ---------- Spotify autoplay ----------
    const TRACK_ID = '2655xYZ347fG2N6OjkoMQ8'; // Logo eu - Jorge & Mateus
    let spotifyBooted = false;

    function playSpotify() {
      const mount = document.getElementById('spotify-embed');
      if (!mount || spotifyBooted) return;
      spotifyBooted = true;

      function boot(IFrameAPI) {
        try {
          IFrameAPI.createController(mount, {
            uri: 'spotify:track:' + TRACK_ID,
            width: '100%',
            height: 152
          }, (controller) => {
            const tryPlay = () => { try { controller.play(); } catch (e) {} };
            controller.addListener('ready', tryPlay);
            setTimeout(tryPlay, 250);
            setTimeout(tryPlay, 1200);
          });
        } catch (e) { /* fallback */ }
      }

      if (window.__spotifyIframeApi) { boot(window.__spotifyIframeApi); return; }
      window.onSpotifyIframeApiReady = (IFrameAPI) => {
        window.__spotifyIframeApi = IFrameAPI;
        boot(IFrameAPI);
      };
      if (!document.getElementById('spotify-api-script')) {
        const s = document.createElement('script');
        s.id = 'spotify-api-script';
        s.src = 'https://open.spotify.com/embed/iframe-api/v1';
        s.async = true;
        document.head.appendChild(s);
      }
    }

    // ---------- lógica da proposta com múltiplas telas ----------
    const stage = document.getElementById('stage');

    const perguntas = [
      "Você aceita ser minha pra sempre?",
      "Tem certeza que é não? 🥺",
      "Me dá uma chance... 💔",
      "Vem cá, reconsdera... 😢",
      "Você vai quebrar meu coração? 💔",
      "Uma última chance? 🙏💗"
    ];

    let telaAtual = 0;

    function renderProposta() {
      const pergunta = perguntas[Math.min(telaAtual, perguntas.length - 1)];
      const tamanhoSimFator = 1 + (telaAtual * 0.25); // aumenta 25% a cada tela

      stage.innerHTML = `
        <div class="big-heart">💕</div>
        <h1 class="pergunta">${pergunta}</h1>
        <div class="buttons-container">
          <button class="btn" id="btn-sim" style="font-size: clamp(${16 * tamanhoSimFator}px, calc(4.2vw * ${tamanhoSimFator}), ${22 * tamanhoSimFator}px); padding: ${14 * tamanhoSimFator}px ${28 * tamanhoSimFator}px; min-height: ${52 * tamanhoSimFator}px;">Sim 💗</button>
          <button class="btn" id="btn-nao">Não</button>
        </div>
      `;

      const btnSim = document.getElementById('btn-sim');
      const btnNao = document.getElementById('btn-nao');

      // sim: explosão + spotify
      btnSim.addEventListener('click', (e) => {
        heartBurst(e.clientX || window.innerWidth / 2, e.clientY || window.innerHeight / 2, 50);
        setTimeout(() => heartBurst(window.innerWidth / 2, window.innerHeight * 0.45, 30), 150);
        renderRespostaSimm();
      });

      // não: vai para próxima tela
      btnNao.addEventListener('click', () => {
        telaAtual++;
        if (telaAtual < perguntas.length) {
          renderProposta();
        } else {
          // após todas as telas, ainda permite dizer não, mas continua aparecendo a última pergunta
          renderProposta();
        }
      });
    }

    function renderRespostaSimm() {
      stage.innerHTML = `
        <div class="big-heart">💗</div>
        <h1 class="pergunta" style="font-size: clamp(26px, 7vw, 36px);">Sim! Você fez o dia mais feliz! 🎶</h1>
        <div class="spotify-wrap"><div id="spotify-embed"></div></div>
        <div class="assinatura">Logo Eu · Jorge & Mateus</div>
      `;
      playSpotify();
    }

    renderProposta();
  </script>
</body>
</html>
