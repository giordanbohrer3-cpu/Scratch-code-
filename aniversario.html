  body.final #foto { opacity: 0.26; }

  #veu {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 42%, rgba(142, 43, 74, 0.20) 0%, rgba(22, 7, 14, 0.55) 62%, rgba(22, 7, 14, 0.92) 100%),
      linear-gradient(180deg, rgba(142, 43, 74, 0.16), rgba(22, 7, 14, 0.30));
    pointer-events: none;
    z-index: 1;
  }

  .camada {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  #chuvaCoracoes { z-index: 2; }
  #coracoesNeon  { z-index: 2; }
  #baloes        { z-index: 3; }
  #confetes      { z-index: 4; }
  #fogos         { z-index: 5; }

  /* ---------- chuvinha de corações brancos, discreta ---------- */
  .coracaoBranco {
    position: absolute;
    top: -6vh;
    color: rgba(255, 248, 251, 0.32);
    text-shadow: 0 0 6px rgba(255, 248, 251, 0.35);
    animation: caiCoracao linear infinite;
    user-select: none;
  }
  @keyframes caiCoracao {
    0%   { transform: translateY(-8vh) translateX(0) rotate(-8deg) scale(1); opacity: 0; }
    8%   { opacity: 1; }
    50%  { transform: translateY(48vh) translateX(2.5vw) rotate(8deg) scale(0.95); }
    92%  { opacity: 0.7; }
    100% { transform: translateY(108vh) translateX(-1.5vw) rotate(-6deg) scale(0.9); opacity: 0; }
  }

  /* ---------- pouquinhos corações rosa neon, piscando e batendo ---------- */
  .coracaoNeon {
    position: absolute;
    color: var(--rosa);
    opacity: 0;
    text-shadow:
      0 0 6px rgba(242, 120, 159, 0.9),
      0 0 16px rgba(242, 120, 159, 0.6),
      0 0 30px rgba(184, 80, 111, 0.4);
    animation: piscaBate ease-in-out infinite;
    user-select: none;
  }
  @keyframes piscaBate {
    0%, 100% { opacity: 0;    transform: scale(0.85); }
    35%      { opacity: 0.14; transform: scale(1.12); }
    45%      { opacity: 0.09; transform: scale(1); }
    55%      { opacity: 0.13; transform: scale(1.1); }
    70%      { opacity: 0.05; transform: scale(0.95); }
  }

  /* ---------- confetes ---------- */
  .confete {
    position: absolute;
    top: -3vh;
    animation: caiConfete linear forwards;
  }
  .confete > i {
    display: block;
    animation: giraConfete linear infinite;
  }
  @keyframes caiConfete {
    0%   { transform: translateY(-4vh) translateX(0); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(108vh) translateX(var(--desvio, 4vw)); opacity: 0; }
  }
  @keyframes giraConfete {
    0%   { transform: rotate3d(1, 1, 0, 0deg); }
    100% { transform: rotate3d(1, 1, 0, 360deg); }
  }

  /* ---------- balões ---------- */
  .balao {
    position: absolute;
    bottom: -18vh;
    width: 44px;
    height: 56px;
    border-radius: 50% 50% 48% 48% / 56% 56% 44% 44%;
    animation: sobeBalao linear forwards;
    filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35));
  }
  .balao::before {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -7px;
    width: 8px;
    height: 8px;
    transform: translateX(-50%);
    background: inherit;
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }
  .balao::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -64px;
    width: 1.5px;
    height: 58px;
    background: rgba(255, 248, 251, 0.35);
  }
  .balao > i {
    position: absolute;
    top: 9px;
    left: 9px;
    width: 12px;
    height: 16px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
    transform: rotate(28deg);
  }
  @keyframes sobeBalao {
    0%   { transform: translateY(0) translateX(0) rotate(-2deg); opacity: 1; }
    50%  { transform: translateY(-62vh) translateX(5vw) rotate(3deg); }
    92%  { opacity: 1; }
    100% { transform: translateY(-128vh) translateX(-3vw) rotate(-3deg); opacity: 0; }
  }

  /* ---------- partículas dos fogos ---------- */
  .particula {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    will-change: transform, opacity;
  }
  .rastro {
    position: absolute;
    width: 3px;
    height: 14px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--dourado), transparent);
    will-change: transform, opacity;
  }

  /* ---------- palco / cartão ---------- */
  .palco {
    position: relative;
    z-index: 10;
    width: min(620px, 100%);
    padding: clamp(28px, 6vw, 56px) clamp(20px, 5vw, 44px);
    margin: 24px 14px;
    background: linear-gradient(170deg, rgba(142, 43, 74, 0.14), rgba(22, 7, 14, 0.42));
    border: 1px solid rgba(242, 120, 159, 0.22);
    border-radius: 18px;
    box-shadow:
      0 0 0 1px rgba(22, 7, 14, 0.4),
      0 24px 70px rgba(0, 0, 0, 0.45),
      inset 0 0 60px rgba(142, 43, 74, 0.10);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .palco.trocando { opacity: 0; transform: translateY(14px) scale(0.985); }

  .eyebrow {
    font-size: clamp(11px, 2.8vw, 13px);
    font-weight: 600;
    letter-spacing: 0.38em;
    text-indent: 0.38em;
    text-transform: uppercase;
    color: var(--dourado);
    margin-bottom: 20px;
    animation: surge 0.9s ease both;
  }

  .titulo {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(30px, 8.4vw, 52px);
    line-height: 1.22;
    letter-spacing: 0.01em;
    color: var(--branco);
    text-wrap: balance;
    text-shadow:
      0 0 18px rgba(242, 120, 159, 0.45),
      0 0 46px rgba(142, 43, 74, 0.55);
    margin-bottom: 26px;
    animation: surge 0.9s ease 0.15s both;
  }

  .nome {
    display: block;
    margin-top: 10px;
    font-size: clamp(34px, 9.4vw, 58px);
    background: linear-gradient(115deg, var(--rosa-claro) 10%, var(--rosa) 45%, var(--dourado) 90%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter: drop-shadow(0 0 14px rgba(242, 120, 159, 0.35));
  }

  .mensagem {
    max-width: 34em;
    margin: 0 auto 30px;
    display: flex;
    flex-direction: column;
    gap: 1.15em;
  }
  .mensagem p {
    font-size: clamp(15.5px, 4.2vw, 18.5px);
    line-height: 1.85;
    letter-spacing: 0.01em;
    color: var(--rosa-claro);
    text-shadow: 0 1px 10px rgba(22, 7, 14, 0.8);
    animation: surge 1s ease both;
  }
  .mensagem p:nth-child(1) { animation-delay: 0.35s; }
  .mensagem p:nth-child(2) { animation-delay: 1.15s; }
  .mensagem p:nth-child(3) { animation-delay: 1.95s; }
  .mensagem p:nth-child(4) { animation-delay: 2.75s; }
  .mensagem p em {
    font-family: var(--serif);
    font-size: 1.1em;
    color: var(--branco);
  }

  .assinatura {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(20px, 5.6vw, 27px);
    color: var(--branco);
    line-height: 1.5;
    text-shadow: 0 0 16px rgba(242, 120, 159, 0.4);
    margin-bottom: 6px;
    animation: surge 1s ease 0.5s both;
  }

  @keyframes surge {
    from { opacity: 0; transform: translateY(16px); filter: blur(5px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }

  .btn {
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    font-family: var(--sans);
    font-size: clamp(16px, 4.4vw, 19px);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--branco);
    background: linear-gradient(160deg, rgba(184, 80, 111, 0.5), rgba(142, 43, 74, 0.34));
    border: 1.5px solid var(--rosa);
    border-radius: 999px;
    padding: 17px 38px;
    min-height: 58px;
    touch-action: manipulation;
    text-shadow: 0 0 8px rgba(242, 120, 159, 0.6);
    box-shadow:
      0 0 18px rgba(242, 120, 159, 0.35),
      0 6px 24px rgba(0, 0, 0, 0.4),
      inset 0 0 14px rgba(242, 120, 159, 0.18);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    animation: surge 0.9s ease 0.45s both, pulsaBtn 2.4s ease-in-out 1.4s infinite;
  }
  .btn:hover, .btn:focus-visible {
    transform: translateY(-3px) scale(1.04);
    background: linear-gradient(160deg, rgba(184, 80, 111, 0.68), rgba(142, 43, 74, 0.5));
    box-shadow:
      0 0 30px rgba(242, 120, 159, 0.65),
      0 10px 30px rgba(0, 0, 0, 0.45),
      inset 0 0 18px rgba(242, 120, 159, 0.3);
  }
  .btn:focus-visible { outline: 2px solid var(--dourado); outline-offset: 3px; }
  .btn:active { transform: scale(0.97); }
  @keyframes pulsaBtn {
    0%, 100% { box-shadow: 0 0 18px rgba(242,120,159,0.35), 0 6px 24px rgba(0,0,0,0.4), inset 0 0 14px rgba(242,120,159,0.18); }
    50%      { box-shadow: 0 0 34px rgba(242,120,159,0.7),  0 6px 24px rgba(0,0,0,0.4), inset 0 0 20px rgba(242,120,159,0.32); }
  }

  /* ---------- coração branco grande, neon, batendo ---------- */
  .coracaoFinal {
    display: inline-block;
    margin-top: 26px;
    font-size: clamp(88px, 26vw, 150px);
    line-height: 1;
    color: var(--branco);
    text-shadow:
      0 0 10px rgba(255, 248, 251, 0.95),
      0 0 26px rgba(255, 248, 251, 0.75),
      0 0 60px rgba(255, 248, 251, 0.45),
      0 0 100px rgba(242, 120, 159, 0.5);
    animation: batimento 1.3s ease-in-out infinite, neonRespira 2.6s ease-in-out infinite;
    user-select: none;
  }
  @keyframes batimento {
    0%, 100% { transform: scale(1); }
    12%      { transform: scale(1.18); }
    24%      { transform: scale(1); }
    36%      { transform: scale(1.12); }
    50%      { transform: scale(1); }
  }
  @keyframes neonRespira {
    0%, 100% {
      text-shadow:
        0 0 10px rgba(255,248,251,0.95), 0 0 26px rgba(255,248,251,0.75),
        0 0 60px rgba(255,248,251,0.45), 0 0 100px rgba(242,120,159,0.5);
    }
    50% {
      text-shadow:
        0 0 14px rgba(255,248,251,1), 0 0 40px rgba(255,248,251,0.9),
        0 0 90px rgba(255,248,251,0.6), 0 0 150px rgba(242,120,159,0.7);
    }
  }

  /* ---------- botão de som ---------- */
  #somBtn {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 20;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(242, 120, 159, 0.55);
    background: rgba(22, 7, 14, 0.62);
    color: var(--rosa-claro);
    font-size: 22px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 14px rgba(242, 120, 159, 0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    touch-action: manipulation;
  }
  #somBtn.visivel { display: flex; }
  #somBtn:focus-visible { outline: 2px solid var(--dourado); outline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    .coracaoFinal { animation: none !important; }
    .btn { animation: surge 0.01ms both !important; }
  }
</style>

</head>
<body>
<div id="foto" aria-hidden="true"></div>
<div id="veu" aria-hidden="true"></div>
<div class="camada" id="chuvaCoracoes" aria-hidden="true"></div>
<div class="camada" id="coracoesNeon" aria-hidden="true"></div>
<div class="camada" id="baloes" aria-hidden="true"></div>
<div class="camada" id="confetes" aria-hidden="true"></div>
<div class="camada" id="fogos" aria-hidden="true"></div>

<main class="palco" id="palco" aria-live="polite"></main>

<button id="somBtn" aria-label="Ligar ou desligar a música">🔊</button>

<script>
(function () {
  'use strict';

  var reduzMovimento = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ================= chuvinha de corações brancos (todas as telas) ================= */
  (function () {
    var c = document.getElementById('chuvaCoracoes');
    for (var i = 0; i < 11; i++) {
      var s = document.createElement('div');
      s.className = 'coracaoBranco';
      s.textContent = '♥';
      s.style.left = (2 + Math.random() * 96) + 'vw';
      s.style.fontSize = (9 + Math.random() * 12) + 'px';
      s.style.animationDuration = (11 + Math.random() * 9) + 's';
      s.style.animationDelay = (-Math.random() * 20) + 's';
      c.appendChild(s);
    }
  })();

  /* ================= pouquinhos corações neon piscando/batendo ================= */
  (function () {
    var c = document.getElementById('coracoesNeon');
    for (var i = 0; i < 6; i++) {
      var s = document.createElement('div');
      s.className = 'coracaoNeon';
      s.textContent = '♥';
      s.style.left = (4 + Math.random() * 92) + 'vw';
      s.style.top = (6 + Math.random() * 88) + 'vh';
      s.style.fontSize = (13 + Math.random() * 14) + 'px';
      s.style.animationDuration = (3.2 + Math.random() * 2.6) + 's';
      s.style.animationDelay = (-Math.random() * 5) + 's';
      c.appendChild(s);
    }
  })();

  /* ================= confetes ================= */
  var coresConfete = ['#f2789f', '#ffd9e4', '#f0c674', '#b8506f', '#fff8fb', '#e8a0b8'];
  var formasConfete = ['2px', '50%', '2px 8px'];

  function soltaConfete() {
    var pai = document.getElementById('confetes');
    if (pai.childElementCount > 130) return;
    var e = document.createElement('div');
    e.className = 'confete';
    var dur = 2.6 + Math.random() * 2.6;
    e.style.left = (Math.random() * 100) + 'vw';
    e.style.setProperty('--desvio', (Math.random() * 16 - 8) + 'vw');
    e.style.animationDuration = dur + 's';
    var m = document.createElement('i');
    var w = 5 + Math.random() * 6;
    m.style.width = w + 'px';
    m.style.height = (w * (0.6 + Math.random())) + 'px';
    m.style.background = coresConfete[Math.floor(Math.random() * coresConfete.length)];
    m.style.borderRadius = formasConfete[Math.floor(Math.random() * formasConfete.length)];
    m.style.animationDuration = (0.5 + Math.random() * 0.9) + 's';
    e.appendChild(m);
    pai.appendChild(e);
    setTimeout(function () { e.remove(); }, dur * 1000 + 200);
  }

  function rajadaConfete(qtd) {
    for (var i = 0; i < qtd; i++) setTimeout(soltaConfete, i * 24);
  }

  /* ================= balões ================= */
  var coresBalao = ['#f2789f', '#b8506f', '#f0c674', '#e8a0b8', '#8e2b4a'];

  function soltaBalao() {
    var pai = document.getElementById('baloes');
    if (pai.childElementCount > 14) return;
    var b = document.createElement('div');
    b.className = 'balao';
    var dur = 8 + Math.random() * 6;
    b.style.left = (Math.random() * 92) + 'vw';
    b.style.background = coresBalao[Math.floor(Math.random() * coresBalao.length)];
    b.style.animationDuration = dur + 's';
    var esc = 0.7 + Math.random() * 0.6;
    b.style.width = (44 * esc) + 'px';
    b.style.height = (56 * esc) + 'px';
    b.appendChild(document.createElement('i'));
    pai.appendChild(b);
    setTimeout(function () { b.remove(); }, dur * 1000 + 200);
  }

  /* ================= fogos de artifício ================= */
  var coresFogo = ['#f2789f', '#f0c674', '#fff8fb', '#e8a0b8', '#ffb3c8'];

  function estouro(x, y, cor) {
    var pai = document.getElementById('fogos');
    var n = reduzMovimento ? 8 : 26;
    for (var i = 0; i < n; i++) {
      var p = document.createElement('div');
      p.className = 'particula';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = cor;
      p.style.boxShadow = '0 0 8px ' + cor + ', 0 0 16px ' + cor;
      pai.appendChild(p);
      var ang = (i / n) * Math.PI * 2 + Math.random() * 0.4;
      var dist = 70 + Math.random() * 130;
      var dx = Math.cos(ang) * dist;
      var dy = Math.sin(ang) * dist;
      var dur = 1100 + Math.random() * 700;
      p.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: 'translate(' + dx * 0.85 + 'px,' + dy * 0.85 + 'px) scale(0.8)', opacity: 0.9, offset: 0.55 },
        { transform: 'translate(' + dx + 'px,' + (dy + 46) + 'px) scale(0.15)', opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0.12, 0.8, 0.35, 1)', fill: 'forwards' });
      setTimeout(function (el) { el.remove(); }.bind(null, p), dur + 60);
    }
  }

  function fogo(x, y) {
    var pai = document.getElementById('fogos');
    var cor = coresFogo[Math.floor(Math.random() * coresFogo.length)];
    var r = document.createElement('div');
    r.className = 'rastro';
    r.style.left = x + 'px';
    r.style.top = window.innerHeight + 'px';
    pai.appendChild(r);
    var subida = reduzMovimento ? 10 : 550 + Math.random() * 250;
    r.animate([
      { transform: 'translateY(0)', opacity: 1 },
      { transform: 'translateY(' + (y - window.innerHeight) + 'px)', opacity: 0.6 }
    ], { duration: subida, easing: 'cubic-bezier(0.3, 0.6, 0.5, 1)', fill: 'forwards' });
    setTimeout(function () {
      r.remove();
      estouro(x, y, cor);
    }, subida);
  }

  function fogoAleatorio() {
    fogo(
      window.innerWidth * (0.12 + Math.random() * 0.76),
      window.innerHeight * (0.12 + Math.random() * 0.4)
    );
  }

  /* ================= festa contínua (começa no primeiro clique) ================= */
  var festaLigada = false;
  function ligaFesta() {
    if (festaLigada) return;
    festaLigada = true;
    rajadaConfete(60);
    for (var i = 0; i < 6; i++) setTimeout(soltaBalao, i * 500);
    fogoAleatorio();
    setTimeout(fogoAleatorio, 500);
    setTimeout(fogoAleatorio, 1000);
    if (!reduzMovimento) {
      setInterval(soltaConfete, 340);
      setInterval(soltaBalao, 2800);
      setInterval(function () { if (Math.random() < 0.8) fogoAleatorio(); }, 3400);
    }
  }

  /* ================= musiquinha: "Parabéns pra Você" (caixinha de música, em loop) ================= */
  var ctx = null;
  var mestre = null;
  var musicaLigada = true;
  var agendador = null;

  var BPM = 100;
  var BEAT = 60 / BPM;
  var LOOP_BEATS = 28;

  /* melodia (t em beats, nota midi, duração em beats) */
  var MELODIA = [
    [0, 67, 0.72], [0.75, 67, 0.24], [1, 69, 0.95], [2, 67, 0.95], [3, 72, 0.95], [4, 71, 1.9],
    [6, 67, 0.72], [6.75, 67, 0.24], [7, 69, 0.95], [8, 67, 0.95], [9, 74, 0.95], [10, 72, 1.9],
    [12, 67, 0.72], [12.75, 67, 0.24], [13, 79, 0.95], [14, 76, 0.95], [15, 72, 0.95], [16, 71, 0.95], [17, 69, 1.9],
    [19, 77, 0.72], [19.75, 77, 0.24], [20, 76, 0.95], [21, 72, 0.95], [22, 74, 0.95], [23, 72, 2.6]
  ];
  /* acompanhamento suave: [t, [notas], duração] */
  var ACORDES = [
    [1, [48, 55, 64], 3], [4, [43, 55, 62], 3], [7, [43, 55, 62], 3], [10, [48, 55, 64], 3],
    [13, [48, 55, 64], 3], [16, [41, 53, 60], 3], [19, [41, 53, 57], 3], [22, [43, 55, 62], 1.5],
    [23, [48, 55, 64], 3]
  ];

  function midiParaHz(m) { return 440 * Math.pow(2, (m - 69) / 12); }

  function criaAudio() {
    if (ctx) return;
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();

    mestre = ctx.createGain();
    mestre.gain.value = 0.5;
    var comp = ctx.createDynamicsCompressor();
    mestre.connect(comp);
    comp.connect(ctx.destination);

    /* eco suave pra dar clima de caixinha de música */
    var eco = ctx.createDelay(1);
    eco.delayTime.value = 0.27;
    var ecoGanho = ctx.createGain();
    ecoGanho.gain.value = 0.22;
    var ecoVolta = ctx.createGain();
    ecoVolta.gain.value = 0.3;
    mestre.connect(eco);
    eco.connect(ecoGanho);
    ecoGanho.connect(comp);
    eco.connect(ecoVolta);
    ecoVolta.connect(eco);
  }

  function nota(hz, quando, dur, vol, tipo) {
    var o1 = ctx.createOscillator();
    var o2 = ctx.createOscillator();
    var g = ctx.createGain();
    o1.type = tipo || 'triangle';
    o2.type = 'sine';
    o1.frequency.value = hz;
    o2.frequency.value = hz * 2;
    o1.detune.value = Math.random() * 5 - 2.5;
    var g2 = ctx.createGain();
    g2.gain.value = 0.28;
    o1.connect(g);
    o2.connect(g2);
    g2.connect(g);
    g.connect(mestre);
    g.gain.setValueAtTime(0.0001, quando);
    g.gain.exponentialRampToValueAtTime(vol, quando + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, quando + Math.max(dur * 1.8, 0.35));
    o1.start(quando); o2.start(quando);
    var fim = quando + Math.max(dur * 1.8, 0.35) + 0.05;
    o1.stop(fim); o2.stop(fim);
  }

  var proximoLoop = 0;

  function agendaLoop(inicio) {
    var i, e;
    for (i = 0; i < MELODIA.length; i++) {
      e = MELODIA[i];
      nota(midiParaHz(e[1]), inicio + e[0] * BEAT, e[2] * BEAT, 0.34, 'triangle');
    }
    for (i = 0; i < ACORDES.length; i++) {
      e = ACORDES[i];
      for (var j = 0; j < e[1].length; j++) {
        nota(midiParaHz(e[1][j]), inicio + (e[0] + j * 0.02) * BEAT, e[2] * BEAT, 0.055, 'sine');
      }
    }
  }

  function ligaMusica() {
    criaAudio();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    if (agendador) return;
    proximoLoop = ctx.currentTime + 0.15;
    agendaLoop(proximoLoop);
    proximoLoop += LOOP_BEATS * BEAT;
    agendador = setInterval(function () {
      if (!musicaLigada) return;
      if (ctx.currentTime > proximoLoop - 1.2) {
        agendaLoop(proximoLoop);
        proximoLoop += LOOP_BEATS * BEAT;
      }
    }, 250);
    var btn = document.getElementById('somBtn');
    btn.classList.add('visivel');
    btn.addEventListener('click', function () {
      musicaLigada = !musicaLigada;
      mestre.gain.setTargetAtTime(musicaLigada ? 0.5 : 0, ctx.currentTime, 0.05);
      if (musicaLigada && ctx.state === 'suspended') ctx.resume();
      if (musicaLigada) { proximoLoop = Math.max(proximoLoop, ctx.currentTime + 0.1); }
      btn.textContent = musicaLigada ? '🔊' : '🔇';
    });
    /* se o celular pausar o áudio (tela bloqueada etc.), retoma no próximo toque */
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && musicaLigada && ctx.state === 'suspended') ctx.resume();
    });
  }

  /* ================= telas do cartão ================= */
  var palco = document.getElementById('palco');

  function trocaTela(render) {
    palco.classList.add('trocando');
    setTimeout(function () {
      render();
      palco.classList.remove('trocando');
    }, 620);
  }

  function tela1() {
    palco.innerHTML =
      '<div class="eyebrow">Uma surpresa para você</div>' +
      '<h1 class="titulo">Achou que ia passar em branco,&nbsp;né?</h1>' +
      '<button class="btn" id="btnAbrir">Toca aqui 🎁</button>';
    document.getElementById('btnAbrir').addEventListener('click', function () {
      ligaMusica();
      ligaFesta();
      trocaTela(tela2);
    });
  }

  function tela2() {
    palco.innerHTML =
      '<div class="eyebrow">Feliz aniversário</div>' +
      '<h1 class="titulo">Para a melhor mãe do mundo,<span class="nome">Daiene Thaís Gonzaga</span></h1>' +
      '<div class="mensagem">' +
        '<p>Mãe, hoje o dia é todo seu — e a gente não ia deixar passar de jeito nenhum. <em>Obrigado por tudo</em> o que você fez e faz por nós a vida inteira.</p>' +
        '<p>Obrigado por cada abraço, cada conselho, cada noite cuidando da gente, cada vez que você abriu mão das suas coisas para que nada faltasse pra nós. Você fez tudo isso sem nunca pedir nada em troca.</p>' +
        '<p>Obrigado por ser essa <em>mulher forte, guerreira e incrível</em> que você é. Tudo de bom que existe na gente veio de você — do seu amor, da sua coragem e do seu exemplo.</p>' +
        '<p>Que a vida te devolva em dobro todo o bem que você espalha. Que esse novo ano seja cheio de saúde, alegria e conquistas, porque ninguém merece mais do que você. 🎂</p>' +
      '</div>' +
      '<button class="btn" id="btnFinal">Tem mais uma coisinha… 💌</button>';
    document.getElementById('btnFinal').addEventListener('click', function () {
      fogoAleatorio();
      setTimeout(fogoAleatorio, 350);
      rajadaConfete(40);
      trocaTela(tela3);
    });
  }

  function tela3() {
    document.body.classList.add('final');
    palco.innerHTML =
      '<div class="eyebrow">Com todo o nosso amor</div>' +
      '<h1 class="titulo">Dos seus filhos queridos</h1>' +
      '<div class="mensagem">' +
        '<p>Te amamos muito, <em>de coração</em> — hoje e todos os dias. Obrigado por ser a melhor mãe do mundo. Que este seja só mais um de muitos e muitos aniversários juntinhos.</p>' +
      '</div>' +
      '<div class="assinatura">Feliz aniversário, mãe! 🎉</div>' +
      '<div class="coracaoFinal" aria-hidden="true">♥</div>';
    fogoAleatorio();
    setTimeout(fogoAleatorio, 600);
    setTimeout(fogoAleatorio, 1200);
  }

  tela1();
})();
</script>

</body>
</html>
